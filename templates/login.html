<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 좋은생각 굿즈 워크 스테이션</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <div class="logo" style="text-align:center">
      <img src="{{ url_for('static', filename='img/logo_goodthinking.png') }}" alt="좋은생각" style="width:160px;margin:0 auto 8px;display:block">
      <div style="font-size:13px;color:var(--brown);font-weight:600;letter-spacing:1px">굿즈 워크 스테이션</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for cat, msg in messages %}
    <div class="flash-msg {{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="login-field">
        <label>아이디</label>
        <input type="text" name="username" placeholder="아이디를 입력하세요" required autofocus>
      </div>
      <div class="login-field">
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
      </div>
      <button type="submit" class="login-btn">로그인</button>
    </form>
    <div class="hint">
      테스트 계정: director / editor / planner / designer / admin_mgr / sub_mgr1 / sub_mgr2<br>
      비밀번호: 1234
    </div>
  </div>
</div>
</body>
</html>
